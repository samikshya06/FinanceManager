<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Manager Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Login Section -->
    <div id="loginSection" class="container">
        <div class="card">
            <h1>Finance Manager</h1>
            <p class="subtitle">Login to view your financial dashboard</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            <div class="divider">or</div>
            <button id="googleLoginBtn" class="btn btn-google">
                <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" style="width: 18px; height: 18px; margin-right: 8px;">
                Login with Google
            </button>
            <p class="switch-form">Don't have an account? <a href="#" id="showRegister">Register here</a></p>
        </div>
    </div>

    <!-- Registration Section -->
    <div id="registerSection" class="container" style="display: none;">
        <div class="card">
            <h1>Finance Manager</h1>
            <p class="subtitle">Create your account</p>
            <form id="registerForm">
                <div class="form-group">
                    <label for="regUserId">User ID</label>
                    <input type="text" id="regUserId" name="userId" required placeholder="Enter your user ID">
                </div>
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" name="name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary">Register</button>
            </form>
            <p class="switch-form">Already have an account? <a href="#" id="showLogin">Login here</a></p>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
